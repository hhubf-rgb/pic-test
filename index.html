<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC 智能评测 - HKUST</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/recorder-core/recorder.mp3.min.js"></script>
    <script src="https://unpkg.com/recorder-core/src/engine/wav.js"></script>
    <style>
        :root { --wechat-green: #07C160; --wechat-red: #FA5151; --hkust-blue: #003366; --hint-color: #ff9800; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .nav-bar { background: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .back-btn { background: none; border: none; color: var(--hkust-blue); font-weight: bold; cursor: pointer; text-decoration: none; font-size: 15px; }
        .toggle-btn { background: #f0f0f0; border: 1px solid #ddd; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .toggle-btn.active { background: var(--hkust-blue); color: white; }
        #feedback-panel { background: #e6f7ff; border: 1px solid #91d5ff; margin: 15px; padding: 15px; border-radius: 8px; display: none; }
        .score-val { font-size: 28px; font-weight: bold; color: var(--hkust-blue); }
        .reading-area { flex: 1; padding: 20px 30px; overflow-y: auto; background: white; line-height: 2.4; font-size: 20px; }
        .paragraph { margin-bottom: 20px; text-indent: 2em; text-align: justify;}
        .pause-mark { color: var(--hint-color); font-weight: bold; margin: 0 4px; }
        .control-panel { background: #fff; border-top: 1px solid #eee; padding: 20px; text-align: center; }
        #recordBtn { width: 68px; height: 68px; border-radius: 50%; border: none; background: var(--wechat-green); color: white; cursor: pointer; }
        #recordBtn.recording { background: var(--wechat-red); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        #status { font-size: 14px; color: #666; margin-top: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="javascript:history.back()" class="back-btn">❮ 返回</a>
        <button id="toggleHint" class="toggle-btn">显示断句提示</button>
    </div>

    <div id="feedback-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>AI 评测总分：<span class="score-val" id="totalScore">--</span></span>
            <button onclick="document.getElementById('feedback-panel').style.display='none'" style="background:none; border:none; color:#888; cursor:pointer;">✖</button>
        </div>
        <div id="feedback-msg" style="margin-top:10px; font-size:13px; color:#555;">等待数据...</div>
    </div>

    <div class="reading-area">
        <div style="text-align:center; font-weight:bold; font-size:24px; margin-bottom:20px;">《春》</div>
        <div id="textContent"></div>
    </div>

    <div class="control-panel">
        <div id="timer">00:00</div>
        <button id="recordBtn">录音</button>
        <div id="status">点击开始朗读</div>
        <audio id="audioPlayback" controls style="width:100%; margin-top:15px; display:none;"></audio>
    </div>

<script>
    const CONFIG = {
        APPID: "979154ce", 
        API_KEY: "62051bfe38a7103fede0a6cb227fb3bb", 
        API_SECRET: "NmY4ZmNiZjk3ZGRkNzFjM2RmMzg0NmQ5"
    };

    const springParagraphs = [
        { normal: "盼望着，盼望着，东风来了，春天的脚步近了。", hint: "盼望着，/ 盼望着，/ 东风来了，// 春天的脚步近了。//" },
        { normal: "一切都像刚睡醒的样子，欣欣然张开了眼。山朗润起来了，水涨起来了，太阳的脸红起来了。", hint: "一切都像刚睡醒的样子，/ 欣欣然张开了眼。// 山朗润起来了，/ 水涨起来了，/ 太阳的脸红起来了。//" },
        { normal: "小草偷偷地从土里钻出来，嫩嫩的，绿绿的。园子里，田野里，瞧去，一大片一大片满是的。坐着，躺着，打两个滚，踢几脚球，赛几趟跑，捉几回迷藏。风轻悄悄的，草软绵绵的。", hint: "小草偷偷地从土里钻出来，/ 嫩嫩的，/ 绿绿的。// 园子里，/ 田野里，/ 瞧去，/ 一大片一大片满是的。// 坐着，/ 躺着，/ 打两个滚，/ 踢几脚球，/ 赛几趟跑，/ 捉几回迷藏。// 风/ 轻悄悄的，/ 草/ 软绵绵的。//" }
    ];

    let showHint = false;
    function renderText() {
        const contentDiv = document.getElementById('textContent');
        contentDiv.innerHTML = '';
        springParagraphs.forEach(p => {
            const div = document.createElement('div');
            div.className = 'paragraph';
            let text = showHint ? p.hint : p.normal;
            text = text.replace(/\/\//g, '【双斜】').replace(/\//g, '【单斜】');
            text = text.replace(/【双斜】/g, '<span class="pause-mark">//</span>').replace(/【单斜】/g, '<span class="pause-mark">/</span>');
            div.innerHTML = text;
            contentDiv.appendChild(div);
        });
        document.getElementById('toggleHint').classList.toggle('active', showHint);
    }
    document.getElementById('toggleHint').onclick = () => { showHint = !showHint; renderText(); };
    renderText();

    let rec;
    document.getElementById('recordBtn').onclick = () => {
        if (!rec || !rec.started) startRec(); else stopRec();
    };

    function startRec() {
        rec = Recorder({type:"wav", sampleRate:16000, bitRate:16, onProcess:(buffers, powerLevel, duration) => {
            document.getElementById('timer').innerText = new Date(duration).toISOString().substr(14, 5);
        }});
        rec.open(() => { 
            rec.start(); 
            rec.started = true; 
            document.getElementById('recordBtn').classList.add('recording'); 
            document.getElementById('status').innerText = "🔴 录音中..."; 
            document.getElementById('feedback-panel').style.display = 'none';
        });
    }

    function stopRec() {
        rec.stop((blob) => {
            rec.started = false;
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('audioPlayback').src = URL.createObjectURL(blob);
            document.getElementById('audioPlayback').style.display = 'block';
            callIfeISE(blob);
        });
    }

    function getAuthUrl() {
        const host = "ise-api.xfyun.cn", date = new Date().toUTCString();
        const signatureOrigin = `host: ${host}\ndate: ${date}\nGET /v2/open-ise HTTP/1.1`;
        const signature = CryptoJS.enc.Base64.stringify(CryptoJS.HmacSHA256(signatureOrigin, CONFIG.API_SECRET));
        const authOrigin = `api_key="${CONFIG.API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
        return `wss://${host}/v2/open-ise?authorization=${btoa(authOrigin)}&date=${encodeURIComponent(date)}&host=${host}`;
    }

    async function callIfeISE(audioBlob) {
        document.getElementById('feedback-panel').style.display = 'block';
        document.getElementById('totalScore').innerText = "评测中...";
        document.getElementById('status').innerText = "🔄 评测流上传中...";

        const buffer = await audioBlob.arrayBuffer();
        const dataArray = new Uint8Array(buffer);
        const ws = new WebSocket(getAuthUrl());
        const chunkSize = 1280; 
        let offset = 0;

        ws.onopen = () => {
            const sendNext = () => {
                if (ws.readyState !== 1) return;
                
                if (offset >= dataArray.length) {
                    ws.send(JSON.stringify({business:{cmd:"auw", aus:2}, data:{status:2}}));
                    return;
                }
                
                let end = Math.min(offset + chunkSize, dataArray.length);
                let chunk = dataArray.slice(offset, end);
                let base64Chunk = btoa(Array.from(chunk).map(b => String.fromCharCode(b)).join(''));
                
                if (offset === 0) {
                    // 核心修复：纯原生字符串传递。丢掉 Base64 文本编码。
                    let rawText = springParagraphs.map(p => p.normal).join('');
                    let cleanText = rawText.replace(/[^\u4e00-\u9fa5，。？！“”；：]/g, ''); // 清理所有非汉字与常见标点

                    ws.send(JSON.stringify({
                        common: {app_id: CONFIG.APPID},
                        business: {
                            category: "read_chapter", // 长文模式
                            rstcd: "utf8", sub: "ise", ent: "cn_vip", tte: "utf-8", cmd: "ssb", 
                            text: '\uFEFF' + cleanText // 只保留 BOM 头与纯净汉字，绝不 Base64
                        },
                        data: {status: 0, data: base64Chunk}
                    }));
                } else {
                    ws.send(JSON.stringify({business: {cmd: "auw", aus: 1}, data: {status: 1, data: base64Chunk}}));
                }
                offset = end;
                setTimeout(sendNext, 40);
            };
            sendNext();
        };

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.code === 0 && res.data && res.data.result) {
                const xml = atob(res.data.result);
                const score = xml.match(/total_score="([^"]+)"/)[1];
                document.getElementById('totalScore').innerText = score;
                document.getElementById('feedback-msg').innerText = "✅ 评测成功！您可以回听音频，完整报告已输出至控制台。";
                document.getElementById('status').innerText = "✅ 评测完成";
                console.log("【最终 XML 得分报告】", xml);
                ws.close();
            } else if (res.code !== 0) {
                document.getElementById('feedback-msg').innerText = `API 报错 (${res.code}): ${res.message}`;
                document.getElementById('status').innerText = "❌ 评测失败";
                ws.close();
            }
        };
    }
</script>
</body>
</html>
