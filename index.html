<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --wechat-green: #07C160; --wechat-red: #FA5151; }
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { text-align: center; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 240px; }
        #recordBtn { width: 64px; height: 64px; border-radius: 50%; border: none; background: var(--wechat-green); color: white; cursor: pointer; margin-bottom: 10px; font-weight: bold; outline: none; }
        #recordBtn.recording { background: var(--wechat-red); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #status { font-size: 14px; color: #666; margin-bottom: 5px; }
        /* 计时器样式 */
        #timer { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 15px; font-family: monospace; }
        audio { width: 100%; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="timer">00:00</div>
    <button id="recordBtn">录音</button>
    <div id="status">准备就绪</div>
    <audio id="audioPlayback" controls></audio>
</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const statusText = document.getElementById('status');
    const timerDisplay = document.getElementById('timer');
    const audioPlayback = document.getElementById('audioPlayback');
    
    let mediaRecorder;
    let chunks = [];
    let startTime;
    let timerInterval;

    // 格式化时间函数
    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
        const secs = (seconds % 60).toString().padStart(2, '0');
        return `${mins}:${secs}`;
    }

    recordBtn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];

                mediaRecorder.onstart = () => {
                    // 开始计时
                    let seconds = 0;
                    timerDisplay.innerText = "00:00";
                    timerInterval = setInterval(() => {
                        seconds++;
                        timerDisplay.innerText = formatTime(seconds);
                    }, 1000);
                };

                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                
                mediaRecorder.onstop = () => {
                    // 停止计时
                    clearInterval(timerInterval);
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    audioPlayback.src = URL.createObjectURL(blob);
                    audioPlayback.style.display = 'block';
                    statusText.innerText = "录音结束";
                };

                mediaRecorder.start();
                recordBtn.innerText = "停止";
                recordBtn.classList.add('recording');
                statusText.innerText = "正在录制...";
            } catch (err) {
                statusText.innerText = "权限被拦截";
            }
        } else {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            recordBtn.innerText = "重录";
            recordBtn.classList.remove('recording');
        }
    };
</script>
</body>
</html>
