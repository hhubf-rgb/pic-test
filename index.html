<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --wechat-green: #07C160; --wechat-red: #FA5151; }
        body { font-family: sans-serif; background: #f9f9f9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .nav-bar { background: white; padding: 10px; border-bottom: 1px solid #ddd; text-align: center; font-weight: bold; }
        .reading-area { flex: 1; padding: 20px; overflow-y: auto; background: white; line-height: 1.8; font-size: 18px; }
        .control-panel { background: #fff; border-top: 1px solid #eee; padding: 20px; text-align: center; }
        #timer { font-size: 24px; font-weight: bold; margin-bottom: 10px; font-family: monospace; }
        #recordBtn { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--wechat-green); color: white; cursor: pointer; }
        #recordBtn.recording { background: var(--wechat-red); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #debug-info { color: red; font-size: 11px; margin-top: 5px; font-family: monospace; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav-bar">PSC 模拟测试 - 《春》</div>

    <div class="reading-area">
        盼望着，盼望着，东风来了，春天的脚步近了... (此处省略正文)
    </div>

    <div class="control-panel">
        <div id="timer">00:00</div>
        <button id="recordBtn">录音</button>
        <div id="debug-info"></div>
        <audio id="audioPlayback" controls></audio>
    </div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const timerDisplay = document.getElementById('timer');
    const audioPlayback = document.getElementById('audioPlayback');
    const debugInfo = document.getElementById('debug-info');
    
    let mediaRecorder;
    let chunks = [];
    let timerInterval;

    // 核心：探测当前浏览器最稳的格式
    function getBestMimeType() {
        const types = [
            'audio/mp4',           // Safari 首选
            'audio/webm;codecs=opus', // Chrome/Firefox 首选
            'audio/webm',
            'audio/aac',
            'audio/wav'
        ];
        for (const type of types) {
            if (MediaRecorder.isTypeSupported(type)) {
                console.log("Selected MIME type:", type);
                return type;
            }
        }
        return '';
    }

    recordBtn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            try {
                debugInfo.innerText = "";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = getBestMimeType();
                
                // 强制指定编码
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                chunks = [];

                mediaRecorder.onstart = () => {
                    let seconds = 0;
                    timerInterval = setInterval(() => {
                        seconds++;
                        timerDisplay.innerText = new Date(seconds * 1000).toISOString().substr(14, 5);
                    }, 1000);
                };

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) chunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    clearInterval(timerInterval);
                    try {
                        const blob = new Blob(chunks, { type: mimeType });
                        const url = URL.createObjectURL(blob);
                        audioPlayback.src = url;
                        
                        // 监听播放器的错误
                        audioPlayback.onerror = (e) => {
                            debugInfo.innerText = "播放器错误代码: " + audioPlayback.error.code + " (可能是格式不支持)";
                        };
                    } catch (err) {
                        debugInfo.innerText = "Blob 生成失败: " + err.message;
                    }
                };

                mediaRecorder.start(200); // 每200ms保存一次切片，防止丢失
                recordBtn.innerText = "停止";
                recordBtn.classList.add('recording');
            } catch (err) {
                debugInfo.innerText = "录音开启失败: " + err.message;
            }
        } else {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            recordBtn.innerText = "重录";
            recordBtn.classList.remove('recording');
        }
    };
</script>
</body>
</html>
